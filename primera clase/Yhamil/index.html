<!DOCTYPE html>
<html lang="es">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presentación de Estudiante</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #06498d;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .tarjeta {
            background-color: rgb(211, 17, 17);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            text-align: center;
            max-width: 350px;
        }

        .circulo-foto {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            border-radius: 50%;
            margin: 0 auto 20px auto;
            display: flex;
            justify-content: center;
            align-items: center;

            color: white;
            font-size: 50px;
            font-weight: bold;
        }

        h1 {
            margin: 0 0 5px;
            color: #1c2c3b;
        }

        h3 {
            margin: 0 0 15px;
            color: #4facfe;
            font-weight: normal;
        }

        p {
            color: #000000;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="tarjeta">
        <div class="circulo-foto">
            YC
        </div>

        <h1>Yhamil Cabrera</h1>

       <h3>estudiante de Sistemas</h3>

        <p>
           primeros pasos
        </p>

    </div>
</body>
</html>

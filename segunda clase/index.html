<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarjeta de Perfil Personal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Tu Nombre</h1>
    </header>

    <main>
        <button id="btn-tema">Cambiar Tema</button>
        <h2>Biografía</h2>
        <p>Escribe aquí una breve biografía sobre ti. Cuéntanos un poco sobre tu experiencia, lo que te apasiona y tus metas.</p>
        
        <section>
            <h2>Mis 3 Habilidades Principales</h2>
            <ul>
                <li>Habilidad 1</li>
                <li>Habilidad 2</li>
                <li>Habilidad 3</li>
            </ul>
        </section>

        <!-- Nueva sección para probar las funciones -->
        <hr style="margin: 20px 0; border: none; border-top: 1px solid #ccc;">
        <section>
            <h2>Prueba de Funciones</h2>
            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <button id="btn-sincrono" class="btn-prueba">Ejecutar Síncrono</button>
                <button id="btn-asincrono" class="btn-prueba">Ejecutar Asíncrono</button>
            </div>
            <div id="resultado-ejemplos">
                El resultado aparecerá aquí...
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
